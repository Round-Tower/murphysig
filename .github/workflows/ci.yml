name: CI

# The correctness gate. Auto-merge of dependency PRs is contingent on this
# passing (see dependabot-automerge.yml). main auto-deploys via Netlify, so a
# red CI here is the line between "shipped" and "shipped broken".

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  benchmark:
    name: benchmark (pytest + ruff)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: benchmark
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install
        run: pip install -e ".[dev,providers]" ruff
      - name: Lint
        run: ruff check .
      - name: Test
        run: python -m pytest -q

  site:
    name: site (build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: site
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: site/package-lock.json
      - run: npm ci
      - run: npm run build
