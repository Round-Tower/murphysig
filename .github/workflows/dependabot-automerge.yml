name: Dependabot triage

# Step 1 of 2 (gating happens in automerge-on-green.yml). On a Dependabot PR:
# label patch/minor with `automerge`; leave majors for manual review. The
# actual merge only happens AFTER CI passes — see automerge-on-green.yml. This
# avoids branch protection (which would block the registry bot's direct push).

on: pull_request_target

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  triage:
    runs-on: ubuntu-latest
    if: github.actor == 'dependabot[bot]'
    steps:
      - name: Fetch Dependabot metadata
        id: meta
        uses: dependabot/fetch-metadata@v3
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Label patch/minor for auto-merge
        if: >-
          steps.meta.outputs.update-type == 'version-update:semver-patch' ||
          steps.meta.outputs.update-type == 'version-update:semver-minor'
        run: gh pr edit "$PR_URL" --add-label automerge
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Flag majors for manual review
        if: steps.meta.outputs.update-type == 'version-update:semver-major'
        run: gh pr comment "$PR_URL" --body "🚦 Major version bump — left for manual review (auto-merge applies to patch/minor only)."
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
