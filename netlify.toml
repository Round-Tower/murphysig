[build]
  base = "site"
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "22"

# /init → /init.sh so users can `curl -sL https://murphysig.dev/init | bash`
[[redirects]]
  from = "/init"
  to = "/init.sh"
  status = 200
  force = true

# Badge fallback: pre-rendered badges (real files at /badge/<owner>/<repo>.svg)
# win because force is off; anything else gets the "not found" badge.
# Never calls GitHub at request time — registry refresh is a nightly Action.
[[redirects]]
  from = "/badge/*"
  to = "/badge-not-found.svg"
  status = 200

[[headers]]
  for = "/init.sh"
  [headers.values]
    Content-Type = "text/x-shellscript; charset=utf-8"
    Cache-Control = "public, max-age=300"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"

[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.svg"
  [headers.values]
    Cache-Control = "public, max-age=86400"

# Badges refresh nightly — cache for an hour so updates propagate same-day.
[[headers]]
  for = "/badge/*"
  [headers.values]
    Cache-Control = "public, max-age=3600"
